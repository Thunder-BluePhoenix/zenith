<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Zenith Dashboard</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #0d1117;
      --surface:  #161b22;
      --border:   #30363d;
      --accent:   #58a6ff;
      --success:  #3fb950;
      --fail:     #f85149;
      --running:  #d29922;
      --text:     #c9d1d9;
      --muted:    #8b949e;
      --font:     'Segoe UI', system-ui, sans-serif;
      --mono:     'Cascadia Code', 'Fira Code', monospace;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      font-size: 14px;
      display: flex;
      flex-direction: column;
      height: 100vh;
    }

    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 12px 24px;
      display: flex;
      align-items: center;
      gap: 16px;
    }
    header h1 { font-size: 18px; font-weight: 600; letter-spacing: .5px; }
    header h1 span { color: var(--accent); }
    .badge {
      font-size: 11px;
      padding: 2px 8px;
      border-radius: 12px;
      font-weight: 500;
    }
    .badge-version { background: #21262d; color: var(--muted); }

    .layout {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    /* ── Run list (left) ─────────────────────────────────────────── */
    #run-list {
      width: 340px;
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .panel-header {
      padding: 10px 16px;
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: .8px;
      color: var(--muted);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    #runs-container {
      flex: 1;
      overflow-y: auto;
    }

    .run-item {
      padding: 12px 16px;
      border-bottom: 1px solid var(--border);
      cursor: pointer;
      transition: background .15s;
    }
    .run-item:hover  { background: #1c2129; }
    .run-item.active { background: #1f2937; border-left: 3px solid var(--accent); }

    .run-item-top {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 4px;
    }

    .status-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .dot-success { background: var(--success); }
    .dot-failed  { background: var(--fail); }
    .dot-running { background: var(--running); animation: pulse 1.2s infinite; }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50%       { opacity: .4; }
    }

    .run-job  { font-weight: 600; font-size: 13px; }
    .run-meta { font-size: 11px; color: var(--muted); margin-left: 16px; }
    .run-id   { font-family: var(--mono); font-size: 10px; color: var(--muted); margin-left: 16px; }

    /* ── Detail (right) ──────────────────────────────────────────── */
    #detail {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    #detail-header {
      padding: 16px 24px;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
    }
    #detail-title  { font-size: 16px; font-weight: 600; margin-bottom: 4px; }
    #detail-meta   { font-size: 12px; color: var(--muted); }

    #steps-list {
      flex: 1;
      overflow-y: auto;
      padding: 16px 24px;
    }

    .step-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      margin-bottom: 10px;
      overflow: hidden;
    }
    .step-card-header {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 14px;
      cursor: pointer;
      user-select: none;
    }
    .step-card-header:hover { background: #1c2129; }

    .step-status-tag {
      font-size: 10px;
      font-weight: 700;
      padding: 2px 7px;
      border-radius: 4px;
      text-transform: uppercase;
    }
    .tag-done    { background: #0d4429; color: var(--success); }
    .tag-failed  { background: #3d1414; color: var(--fail); }
    .tag-started { background: #2d2208; color: var(--running); }
    .tag-cached  { background: #0c2a4a; color: var(--accent); }

    .step-name { font-weight: 500; font-size: 13px; }
    .step-time { margin-left: auto; font-size: 11px; color: var(--muted); }

    .step-logs {
      padding: 10px 14px;
      background: #010409;
      border-top: 1px solid var(--border);
      font-family: var(--mono);
      font-size: 12px;
      line-height: 1.6;
      white-space: pre-wrap;
      word-break: break-all;
      display: none;
    }
    .step-logs.open { display: block; }

    /* ── Empty state ─────────────────────────────────────────────── */
    .empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      color: var(--muted);
      gap: 8px;
    }
    .empty-state svg { opacity: .3; }
    .empty-state p   { font-size: 13px; }

    /* ── Refresh button ──────────────────────────────────────────── */
    .btn-icon {
      background: none;
      border: 1px solid var(--border);
      color: var(--muted);
      border-radius: 5px;
      padding: 3px 8px;
      cursor: pointer;
      font-size: 12px;
      transition: color .15s, border-color .15s;
    }
    .btn-icon:hover { color: var(--text); border-color: var(--accent); }

    /* ── Scrollbar ───────────────────────────────────────────────── */
    ::-webkit-scrollbar       { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #30363d; border-radius: 3px; }
  </style>
</head>
<body>
  <header>
    <h1><span>⚡</span> Zenith</h1>
    <span class="badge badge-version">v0.1.0</span>
    <span style="margin-left:auto;font-size:12px;color:var(--muted)" id="status-line">Loading…</span>
  </header>

  <div class="layout">
    <!-- Left: run list -->
    <div id="run-list">
      <div class="panel-header">
        Recent Runs
        <button class="btn-icon" onclick="loadRuns()" title="Refresh">↺</button>
      </div>
      <div id="runs-container">
        <div class="empty-state"><p>Loading runs…</p></div>
      </div>
    </div>

    <!-- Right: detail -->
    <div id="detail">
      <div id="detail-header">
        <div id="detail-title" style="color:var(--muted)">Select a run</div>
        <div id="detail-meta"></div>
      </div>
      <div id="steps-list">
        <div class="empty-state">
          <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>
          </svg>
          <p>Select a run from the left panel to view step details.</p>
        </div>
      </div>
    </div>
  </div>

<script>
const API = '';
let activeId = null;

// ── helpers ────────────────────────────────────────────────────────────────

function ts(secs) {
  if (!secs) return '—';
  return new Date(secs * 1000).toLocaleString();
}

function dotClass(status) {
  if (status === 'success') return 'dot-success';
  if (status === 'failed')  return 'dot-failed';
  return 'dot-running';
}

function tagClass(status) {
  if (status === 'done')    return 'tag-done';
  if (status === 'failed')  return 'tag-failed';
  if (status === 'cached')  return 'tag-cached';
  return 'tag-started';
}

// ── runs list ──────────────────────────────────────────────────────────────

async function loadRuns() {
  document.getElementById('status-line').textContent = 'Refreshing…';
  try {
    const res = await fetch(`${API}/api/runs`);
    const runs = await res.json();
    renderRuns(runs);
    document.getElementById('status-line').textContent =
      `${runs.length} run${runs.length !== 1 ? 's' : ''} · ${new Date().toLocaleTimeString()}`;
  } catch(e) {
    document.getElementById('status-line').textContent = 'Error: ' + e.message;
  }
}

function renderRuns(runs) {
  const container = document.getElementById('runs-container');
  if (!runs.length) {
    container.innerHTML = '<div class="empty-state"><p>No runs yet. Run <code>zenith run</code> to start.</p></div>';
    return;
  }
  container.innerHTML = runs.map(r => `
    <div class="run-item ${r.run_id === activeId ? 'active' : ''}"
         onclick="selectRun('${r.run_id}', this)">
      <div class="run-item-top">
        <span class="status-dot ${dotClass(r.status)}"></span>
        <span class="run-job">${esc(r.job)}</span>
      </div>
      <div class="run-meta">
        ${ts(r.started_at_secs)} &nbsp;·&nbsp;
        ${r.steps_ok}/${r.step_count} steps OK
      </div>
      <div class="run-id">${r.run_id.slice(0, 16)}…</div>
    </div>
  `).join('');
}

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ── detail panel ───────────────────────────────────────────────────────────

async function selectRun(id, el) {
  activeId = id;
  document.querySelectorAll('.run-item').forEach(e => e.classList.remove('active'));
  if (el) el.classList.add('active');

  document.getElementById('detail-title').textContent = 'Loading…';
  document.getElementById('detail-meta').textContent = '';
  document.getElementById('steps-list').innerHTML = '<div class="empty-state"><p>Loading steps…</p></div>';

  try {
    const [runRes, stepsRes] = await Promise.all([
      fetch(`${API}/api/runs/${id}`),
      fetch(`${API}/api/runs/${id}/steps`),
    ]);
    const run   = await runRes.json();
    const steps = await stepsRes.json();
    renderDetail(run, steps);
  } catch(e) {
    document.getElementById('detail-title').textContent = 'Error loading run';
    document.getElementById('detail-meta').textContent = e.message;
  }
}

function renderDetail(run, steps) {
  document.getElementById('detail-title').textContent = run.job + ' — ' + run.status;
  document.getElementById('detail-meta').textContent =
    `Run ID: ${run.run_id}  ·  Started: ${ts(run.started_at_secs)}  ·  ` +
    `Finished: ${ts(run.finished_at_secs)}  ·  Steps: ${run.steps_ok}/${run.step_count} OK`;

  if (!steps.length) {
    document.getElementById('steps-list').innerHTML =
      '<div class="empty-state"><p>No step events recorded for this run.</p></div>';
    return;
  }

  document.getElementById('steps-list').innerHTML = steps.map((s, i) => `
    <div class="step-card">
      <div class="step-card-header" onclick="toggleLogs(${i})">
        <span class="step-status-tag ${tagClass(s.status)}">${esc(s.status)}</span>
        <span class="step-name">${esc(s.name)}</span>
        <span class="step-time">${ts(s.at_secs)}</span>
      </div>
      ${s.log_lines && s.log_lines.length
        ? `<div class="step-logs" id="logs-${i}">${esc(s.log_lines.join('\n'))}</div>`
        : ''}
    </div>
  `).join('');
}

function toggleLogs(i) {
  const el = document.getElementById('logs-' + i);
  if (el) el.classList.toggle('open');
}

// ── init ────────────────────────────────────────────────────────────────────

loadRuns();
setInterval(loadRuns, 10000);   // auto-refresh every 10 s
</script>
</body>
</html>
